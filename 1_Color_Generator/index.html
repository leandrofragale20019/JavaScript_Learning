<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Color changing</title>
</head>
<body>
    <h1>Random Color Generator</h1>


    <button id="colorbtn" type="button" class="button">
        <div class="button-top">Click me</div>
        <div class="button-bottom"></div>
        <div class="button-base"></div>
      </button>

    <p>Color: <span id="colorName"></span></p>

    <script>

       const btn = document.getElementById("colorbtn")
       const colorDisplay = document.getElementById("colorName")

       btn.onclick = function () {

        let neueFarbe = "#" + Math.floor(Math.random()*16777215).toString(16);
            
        document.body.style.backgroundColor = neueFarbe;
        colorDisplay.innerHTML = neueFarbe;
        }

       

    </script>
</body>
</html>
